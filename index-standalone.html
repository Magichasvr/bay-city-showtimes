<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bay City Cleaner - Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #e94560;
      --primary-hover: #c73650;
      --accent: #3dd6f5;
      --bg-dark: #080810;
      --bg-card: #121620;
      --bg-card-hover: #1a2030;
      --text: #e8ecf0;
      --text-muted: #8899aa;
      --text-dim: #556677;
      --border: #2a3444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: radial-gradient(ellipse at top, #121620 0%, #080810 100%);
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 80px;
    }
    .header {
      background: linear-gradient(180deg, #1a2535 0%, #0d1520 100%);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-content {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { height: 40px; }
    .header-title {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .nav {
      background: rgba(18, 22, 32, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 73px;
      z-index: 99;
      border-bottom: 1px solid var(--border);
    }
    .nav-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      list-style: none;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 14px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .nav-item:hover { color: var(--text); background: rgba(233, 69, 96, 0.08); }
    .nav-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: rgba(233, 69, 96, 0.05);
    }
    .nav-count {
      display: inline-block;
      background: var(--primary);
      color: white;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 6px;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .date-display {
      text-align: center;
      padding: 16px 24px;
      background: linear-gradient(135deg, #1a2535 0%, #151d28 100%);
      border-radius: 12px;
      margin-bottom: 16px;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--primary);
      border: 1px solid rgba(233, 69, 96, 0.3);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .movie-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #151c28 0%, #0f141c 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: all 0.25s ease;
    }
    .movie-card:hover {
      background: linear-gradient(135deg, #1c2538 0%, #141a24 100%);
      border-color: rgba(233, 69, 96, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.15);
    }
    .movie-card.cleaned { opacity: 0.5; }
    .checkbox {
      width: 24px;
      height: 24px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    .movie-info { flex: 1; min-width: 0; }
    .movie-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .movie-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rating {
      background: rgba(61, 214, 245, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--accent);
    }
    .theater-type { color: var(--accent); font-weight: 700; font-size: 0.75rem; }
    .auditorium {
      background: linear-gradient(135deg, #e94560 0%, #b8324a 100%);
      color: white;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .showtime {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      background: rgba(61, 214, 245, 0.12);
      border: 1px solid rgba(61, 214, 245, 0.25);
    }
    .showtime.expired { text-decoration: line-through; opacity: 0.35; background: transparent; border-color: transparent; }
    .showtime.available {
      background: linear-gradient(135deg, #e94560 0%, #c73650 100%);
      border-color: transparent;
      box-shadow: 0 2px 10px rgba(233, 69, 96, 0.4);
    }
  </style>
</head>
<body>

    </div>

  <div class="nav">

      </li>
      <li class="nav-item" data-tab="cleaned" onclick="switchTab('cleaned')">
        Cleaned <span class="nav-count" id="cleanedCount">0</span>

    </ul>
  </div>
  
  <div class="container">

      {"movieId":"thesupermariogalaxymoviegdx-8-4","movie":"The Super Mario Galaxy Movie GDX","rating":"PG","time":"6:30p","endTime":"8:08pm","theater":"GDX","auditorium":"7","runtime":"1h 38m","endMins":1288},
      {"movieId":"thesupermariogalaxymovie-9-1","movie":"The Super Mario Galaxy Movie","rating":"PG","time":"11:40a","endTime":"1:18pm","theater":"General","auditorium":"1","runtime":"1h 38m","endMins":738},
      {"movieId":"thesupermariogalaxymovie-9-2","movie":"The Super Mario Galaxy Movie","rating":"PG","time":"2:45p","endTime":"4:23pm","theater":"General","auditorium":"2","runtime":"1h 38m","endMins":983},

      {"movieId":"thesupermariogalaxymovie-9-4","movie":"The Super Mario Galaxy Movie","rating":"PG","time":"7:40p","endTime":"9:18am","theater":"General","auditorium":"4","runtime":"1h 38m","endMins":1338},

      {"movieId":"thedrama-10-3","movie":"The Drama","rating":"R","time":"7:50p","endTime":"9:35am","theater":"General","auditorium":"3","runtime":"1h 45m","endMins":1385},
      {"movieId":"thepoutpoutfish-11-1","movie":"The Pout-Pout Fish","rating":"PG","time":"11:00a","endTime":"12:31pm","theater":"General","auditorium":"1","runtime":"1h 31m","endMins":751},
      {"movieId":"projecthailmary-12-1","movie":"Project Hail Mary","rating":"PG-13","time":"12:00p","endTime":"2:36pm","theater":"General","auditorium":"1","runtime":"2h 36m","endMins":916},
      {"movieId":"projecthailmary-12-2","movie":"Project Hail Mary","rating":"PG-13","time":"3:30p","endTime":"6:06am","theater":"General","auditorium":"2","runtime":"2h 36m","endMins":1086},
      {"movieId":"projecthailmary-12-3","movie":"Project Hail Mary","rating":"PG-13","time":"7:00p","endTime":"9:36am","theater":"General","auditorium":"3","runtime":"2h 36m","endMins":1336},
      {"movieId":"remindersofhim-13-1","movie":"Reminders of Him","rating":"PG-13","time":"3:00p","endTime":"4:54pm","theater":"General","auditorium":"1","runtime":"1h 54m","endMins":1014},
      {"movieId":"remindersofhim-13-2","movie":"Reminders of Him","rating":"PG-13","time":"7:20p","endTime":"9:14am","theater":"General","auditorium":"2","runtime":"1h 54m","endMins":1274},
      {"movieId":"hoppers-14-1","movie":"Hoppers","rating":"PG","time":"11:10a","endTime":"12:55pm","theater":"General","auditorium":"1","runtime":"1h 45m","endMins":775},
      {"movieId":"hoppers-14-2","movie":"Hoppers","rating":"PG","time":"2:00p","endTime":"3:45pm","theater":"General","auditorium":"2","runtime":"1h 45m","endMins":945},
      {"movieId":"hoppers-14-3","movie":"Hoppers","rating":"PG","time":"4:40p","endTime":"6:25pm","theater":"General","auditorium":"3","runtime":"1h 45m","endMins":1165},
      {"movieId":"ferrisbuellersdayoff40thanniversary-15-1","movie":"Ferris Bueller's Day Off 40th Anniversary","rating":"PG-13","time":"1:40p","endTime":"3:23pm","theater":"Flashback","auditorium":"1","runtime":"1h 43m","endMins":923},
      {"movieId":"ferrisbuellersdayoff40thanniversary-15-2","movie":"Ferris Bueller's Day Off 40th Anniversary","rating":"PG-13","time":"8:00p","endTime":"9:43am","theater":"Flashback","auditorium":"1","runtime":"1h 43m","endMins":1363}
    ];
    let todaysShowtimes = [];
    let cleaned = {};
    let currentTab = 'nowplaying';
    let dataSource = 'loading';
    
    async function loadShowtimes() {
      try {
        const response = await fetch(API_URL, { cache: 'no-store' });
        if (response.ok) {
          const data = await response.json();
          if (data.shows && data.shows.length > 0) {
            todaysShowtimes = data.shows;
            dataSource = 'api';
            return;
          }
        }
      } catch (e) {}
      // Use embedded data as fallback
      todaysShowtimes = embeddedShowtimes;
      dataSource = 'offline';
    }
    
    async function init() {
      cleaned = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      
      const today = new Date();
      document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      
      currentTab = 'nowplaying';
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      const nowplayingTab = document.querySelector('[data-tab="nowplaying"]');
      if (nowplayingTab) nowplayingTab.classList.add('active');
      
      await loadShowtimes();
      render();
    }
    
    window.onload = init;
    
    function getRuntimeMinutes(runtime) {
      if (!runtime) return 0;
      const match = runtime.match(/(\d+)h\s*(\d+)m/);
      if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
      return 0;
    }
    
    function timeToMinutes(timeStr) {
      if (!timeStr) return 0;
      const match = timeStr.match(/(\d+):(\d+)([ap]m)/);
      if (!match) return 0;
      let hours = parseInt(match[1]);
      const mins = parseInt(match[2]);
      const period = match[3].toLowerCase();
      if (period === 'pm' && hours !== 12) hours += 12;
      if (period === 'am' && hours === 12) hours = 0;
      return hours * 60 + mins;
    }
    
    function minutesToTime(totalMins) {
      const hours = totalMins % 1440;
      const endHours = Math.floor(hours / 60);
      const endMins = hours % 60;
      const periodStr = endHours >= 12 ? 'pm' : 'am';
      const displayHours = endHours === 0 ? 12 : (endHours > 12 ? endHours - 12 : endHours);
      return displayHours + ':' + endMins.toString().padStart(2, '0') + periodStr;
    }
    
    function getEndTime(startTime, runtime) {
      const runtimeMins = getRuntimeMinutes(runtime);
      if (runtimeMins === 0) return '';
      const startMins = timeToMinutes(startTime);
      const totalMins = startMins + runtimeMins;
      return minutesToTime(totalMins);
    }
    
    function getEndMinutes(startTime, runtime) {
      const runtimeMins = getRuntimeMinutes(runtime);
      if (runtimeMins === 0) return 0;
      const startMins = timeToMinutes(startTime);
      return startMins + runtimeMins;
    }
    
    function isMovieEnded(time, runtime) {
      const endMins = getEndMinutes(time, runtime);
      if (endMins === 0) return false;
      const now = new Date();
      return (now.getHours() * 60 + now.getMinutes()) > endMins;
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
      render();
    }
    
    function toggleCleaned(movieId, time) {
      const key = movieId + '|' + time;
      cleaned[key] = !cleaned[key];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
      render();
    }
    
    function render() {
      const list = document.getElementById('movieList');
      
      const sorted = [...todaysShowtimes].sort((a, b) => {
        const endA = a.endMins || getEndMinutes(a.time, a.runtime);
        const endB = b.endMins || getEndMinutes(b.time, b.runtime);
        return endA - endB;
      });
      
      const filtered = currentTab === 'nowplaying' 
        ? sorted.filter(st => !cleaned[st.movieId + '|' + st.time])
        : sorted.filter(st => cleaned[st.movieId + '|' + st.time]);
      
      if (filtered.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:#889aa1;font-size:1.1rem;">No showtimes</div>';
      } else {
        list.innerHTML = filtered.map(st => {
          const key = st.movieId + '|' + st.time;
          const isCleaned = cleaned[key] === true;
          const endTime = st.endTime || getEndTime(st.time, st.runtime);
          const endMins = st.endMins || getEndMinutes(st.time, st.runtime);
          const movieEnded = isMovieEnded(st.time, st.runtime);
          const showtimeClass = movieEnded ? 'showtime expired' : 'showtime available';
          
          return '<div class="movie-card ' + (isCleaned ? 'cleaned' : '') + '">' +
            '<input type="checkbox" class="checkbox" ' + (isCleaned ? 'checked' : '') + ' onchange="toggleCleaned(\'' + st.movieId + '\',\'' + st.time + '\')">' +
            '<div class="movie-info">' +
              '<div class="movie-title">' + st.movie + '</div>' +
              '<div class="movie-meta">' +
                '<span class="rating">' + st.rating + '</span>' +
                '<span class="theater-type">' + st.theater + '</span>' +
                '<span class="auditorium">Aud ' + st.auditorium + '</span>' +
              '</div>' +
              '<span class="' + showtimeClass + '">' + endTime + '</span>' +
            '</div>' +
          '</div>';
        }).join('');
      }
      
      const nowPlaying = sorted.filter(st => !cleaned[st.movieId + '|' + st.time]).length;
      const cleanedCount = sorted.filter(st => cleaned[st.movieId + '|' + st.time]).length;
      document.getElementById('nowPlayingCount').textContent = nowPlaying;
      document.getElementById('cleanedCount').textContent = cleanedCount;
    }
  </script>
</body>
</html>
